<form [formGroup]="exForm" (ngSubmit)="onSubmit()">
  <!-- Наименование упражнения -->
  <div class="tui-form__row">
    <tui-textfield tuiTextfieldSize="m">
      <label tuiLabel>Наименование упражнения</label>
      <input tuiTextfield formControlName='name' />
      <span class="tui-required"></span>
    </tui-textfield>
    <tui-error formControlName="name" [error]="[] | tuiFieldError | async"></tui-error>
  </div>

  <!-- ГРУППА МЫШЦ -->
  <div class="tui-form__row">
    <tui-textfield tuiChevron tuiDropdownMobile class='trainingForm__exercise'>
      <label tuiLabel>Выберите группу мышц</label>
      <input tuiSelect formControlName="muscle_group" />

      <tui-data-list-wrapper *tuiTextfieldDropdown new [items]="b_parts" />
      <tui-error formControlName='muscle_group' [error]="[] | tuiFieldError | async"></tui-error>
    </tui-textfield>
  </div>
  <!-- ССЫЛКА НА ВИДЕОЗАПИСЬ -->
  <div class="tui-form__row">
    <tui-textfield tuiTextfieldSize="m">
      <label tuiLabel>Ссылка на видео</label>
      <input tuiTextfield formControlName='url' />
    </tui-textfield>
    <tui-error formControlName="url" [error]="[] | tuiFieldError | async"></tui-error>
  </div>

  <!-- КОММЕНТАРИЙ -->
  <div class="tui-form__row">
    <tui-textfield tuiTextfieldSize="m">
      <label tuiLabel>Комментарий</label>
      <input tuiTextfield formControlName='comment' />
    </tui-textfield>
    <tui-error formControlName="comment" [error]="[] | tuiFieldError | async"></tui-error>
  </div>
</form>

<button tuiButton [size]="'m'" (click)="onSubmit()" [disabled]='exForm.invalid' type="submit">Сохранить</button>
