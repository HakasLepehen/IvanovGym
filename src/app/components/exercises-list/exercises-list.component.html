<div class="container">
  <!-- <app-exercises-form [model]="selectedExercise"></app-exercises-form> -->
  <!-- <app-adding-exercise /> -->
  <h5 class='tui-text_h4' class="container__title">Упражнения на {{title}}</h5>
  <ul>
    <li *ngFor="let item of exercises | async">
      <div>
        <div class="title__block">
          <h4 class="title">{{item.name}}</h4>
          <div class="title__block_buttons">
            <button (click)="editExercise(item)" tuiIconButton iconStart="@tui.pencil" size='s'></button>
            <button (click)="deleteExercise(item)" tuiIconButton iconStart="@tui.trash" size='s' appearance="accent" type="button"></button>
          </div>
        </div>
      </div>
    </li>
  </ul>
</div>
